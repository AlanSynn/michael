name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Validate, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build add-in (production)
        run: npm run build

      # Validate the TRANSFORMED prod manifest (dist/manifest.prod.xml), not just
      # the source manifest. Catches webpack CopyWebpackPlugin transform
      # regressions: a leftover localhost URL, a surviving localhost AppDomain,
      # or a mangled <Resources> id — any of which Outlook rejects at install.
      - name: Validate production manifest (post-transform)
        run: npx office-addin-manifest validate dist/manifest.prod.xml

      # Playwright e2e runs against the built dist/. Cache the browser binary
      # keyed on the installed @playwright/test version so it survives runs.
      - name: Resolve Playwright version
        id: pw
        run: |
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build add-in (production)
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
