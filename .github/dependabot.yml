version: 2
updates:
  # npm dependencies — grouped to keep PR noise low.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      babel:
        patterns: ["@babel/*"]
      office-addin:
        patterns: ["office-addin-*", "@types/office-*"]
      playwright:
        patterns: ["@playwright/*", "playwright"]
      webpack:
        patterns: ["webpack*", "babel-loader", "html-webpack-plugin", "copy-webpack-plugin"]
    commit-message:
      prefix: chore(deps)

  # GitHub Actions — keep workflow action versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(ci)
