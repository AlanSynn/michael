<!-- Function-file host page for the Michael add-in's ribbon commands. -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <!--
      Content-Security-Policy: defense-in-depth, mirroring taskpane.html. The
      function-file loads office.js (appsforoffice.microsoft.com), which itself
      loads MicrosoftAjax.js from ajax.aspnetcdn.com and POSTs telemetry to
      browser.pipe.aria.microsoft.com — all must be allowed. No 'unsafe-inline'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com; connect-src 'self' https://api.z.ai https://browser.pipe.aria.microsoft.com; base-uri 'none'; object-src 'none';"
    />

    <!-- Office JavaScript API (CDN). The entry chunk (commands.js) is injected
         by HtmlWebpackPlugin (chunks: ["commands"]) — do NOT add a manual
         <script src="commands.js"> here: html-loader treats a relative src as
         an asset, emits a second hashed copy of the entry, and the resulting
         realContentHash mismatch leaves commands.html referencing a file that
         is never emitted (HTTP 404 on the function-file). -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>

</body>

</html>
